<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded Clip Path for the icon frame -->
  <defs>
    <!-- Filter for Glow effects on traces -->
    <filter id="traceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Filter for bold text shadow -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="6" stdDeviation="6" floodColor="#000000" floodOpacity="0.9" />
    </filter>

    <!-- Linear Gradient for dark metallic PCB base -->
    <linearGradient id="pcbBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050811" />
      <stop offset="100%" stop-color="#0B101D" />
    </linearGradient>

    <!-- Linear Gradient for Diagonal PCB Stripes -->
    <linearGradient id="pcbStripe1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E2338" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#050C14" stop-opacity="0.3" />
    </linearGradient>

    <!-- Radial corner luminous blooms -->
    <radialGradient id="topLeftBloom" cx="0%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#FF2E93" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#FF5E3A" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#FF2E93" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="bottomRightBloom" cx="100%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#FF0055" stop-opacity="0.95" />
      <stop offset="40%" stop-color="#FF5500" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#7A00FF" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="centerTechGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D2FF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#00D2FF" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Base Container -->
  <rect width="512" height="512" rx="112" fill="url(#pcbBase)" />
  <rect width="504" height="504" x="4" y="4" rx="108" stroke="rgba(255, 255, 255, 0.12)" stroke-width="8" />

  <!-- Corner Glow Blooms (Vibrant Neon Red, Orange, Purple) -->
  <rect width="512" height="512" rx="112" fill="url(#topLeftBloom)" style="mix-blend-mode: screen;" />
  <rect width="512" height="512" rx="112" fill="url(#bottomRightBloom)" style="mix-blend-mode: screen;" />
  <circle cx="256" cy="256" r="180" fill="url(#centerTechGlow)" style="mix-blend-mode: color-dodge;" />

  <!-- Diagonal PCB Layout Stripes -->
  <!-- Main center group rotated diagonally to match the real logo -->
  <g transform="rotate(-38 256 256)">
    <!-- Main High-Contrast Diagonal PCB Track Stripe -->
    <rect x="-100" y="166" width="712" height="180" fill="#060C1A" />
    <rect x="-100" y="172" width="712" height="4" fill="#3B82F6" opacity="0.4" />
    <rect x="-100" y="336" width="712" height="4" fill="#E5B93C" opacity="0.4" />

    <!-- Circuit board copper/gold traces in PCB belt -->
    <path d="M-100 216 L310 216 L350 256 L712 256" stroke="#E5B93C" stroke-width="4" stroke-linecap="round" opacity="0.75" />
    <path d="M-100 296 L202 296 L242 256 L712 256" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round" opacity="0.8" filter="url(#traceGlow)" />
    
    <!-- Secondary finer trace lines -->
    <path d="M-100 186 L400 186 L440 226 L712 226" stroke="#00F0FF" stroke-width="2.5" stroke-dasharray="12 6" opacity="0.6" />
    <path d="M-100 316 L120 316 L160 276 L712 276" stroke="#FF00D4" stroke-width="2" opacity="0.5" />

    <!-- Technical micro-nodes / dots -->
    <circle cx="310" cy="216" r="6" fill="#E5B93C" />
    <circle cx="350" cy="256" r="4" fill="#FFFFFF" />
    <circle cx="202" cy="296" r="6" fill="#3B82F6" />
    <circle cx="242" cy="256" r="4.5" fill="#00FFFF" />
    <circle cx="120" cy="316" r="5" fill="#FF00D4" />
    <circle cx="160" cy="276" r="4" fill="#FFFFFF" />

    <!-- Integrated Circuits (IC) chip representations on the PCB belt -->
    <rect x="60" y="210" width="48" height="32" rx="4" fill="#131B2E" stroke="rgba(255,255,255,0.15)" stroke-width="2" />
    <line x1="68" y1="206" x2="68" y2="210" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="78" y1="206" x2="78" y2="210" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="88" y1="206" x2="88" y2="210" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="98" y1="206" x2="98" y2="210" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="68" y1="242" x2="68" y2="246" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="78" y1="242" x2="78" y2="246" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="88" y1="242" x2="88" y2="246" stroke="#E5B93C" stroke-width="2.5" />
    <line x1="98" y1="242" x2="98" y2="246" stroke="#E5B93C" stroke-width="2.5" />
    
    <!-- Bold diagonal "DCDC" text in the upper layer of the PCB -->
    <text 
      x="256" 
      y="272" 
      fill="#FFFFFF" 
      font-family="'Inter', system-ui, -apple-system, sans-serif" 
      font-weight="950" 
      font-size="115" 
      letter-spacing="2" 
      text-anchor="middle" 
      alignment-baseline="middle"
      filter="url(#textShadow)"
    >DCDC</text>
  </g>

  <!-- Technical grid pattern overlay to make it look like schematic diagram draft -->
  <g stroke="rgba(255, 255, 255, 0.05)" stroke-width="1">
    <path d="M0 64 H512 M0 128 H512 M0 192 H512 M0 256 H512 M0 320 H512 M0 384 H512 M0 448 H512" />
    <path d="M64 0 V512 M128 0 V512 M192 0 V512 M256 0 V512 M320 0 V512 M384 0 V512 M448 0 V512" />
  </g>

  <!-- Gold finger edge connectors around top-right & bottom-left border curves -->
  <g fill="#E5B93C" opacity="0.35">
    <rect x="420" y="30" width="6" height="24" rx="3" transform="rotate(30 420 30)" />
    <rect x="440" y="45" width="6" height="24" rx="3" transform="rotate(30 440 45)" />
    <rect x="460" y="65" width="6" height="24" rx="3" transform="rotate(30 460 65)" />
    
    <rect x="52" y="420" width="6" height="24" rx="3" transform="rotate(30 52 420)" />
    <rect x="72" y="440" width="6" height="24" rx="3" transform="rotate(30 72 440)" />
    <rect x="92" y="460" width="6" height="24" rx="3" transform="rotate(30 92 460)" />
  </g>
</svg>
